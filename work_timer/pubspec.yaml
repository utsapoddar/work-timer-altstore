name: work_timer
description: "Work session timer with automatic break scheduling."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_local_notifications: ^18.0.0
  audioplayers: ^6.1.0
  timezone: ^0.9.4
  flutter_timezone: ^5.0.0
  file_picker: ^8.0.0
  shared_preferences: ^2.3.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/alarm.wav
    - assets/alarm.mp3
