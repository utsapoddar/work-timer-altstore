name: Build Windows

on:
  release:
    types: [published]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Windows
        working-directory: work_timer
        run: flutter build windows --release

      - name: Zip release
        run: |
          Compress-Archive -Path work_timer\build\windows\x64\runner\Release\* -DestinationPath Sift-Windows.zip

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} Sift-Windows.zip
